<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notepad</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #181825;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #313244;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
    }

    #file-name {
      font-size: 13px;
      color: #a6adc8;
      background: transparent;
      border: none;
      outline: none;
      width: 180px;
    }

    .toolbar {
      background: #181825;
      padding: 6px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid #313244;
    }

    .toolbar button {
      background: #313244;
      color: #cdd6f4;
      border: none;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }

    .toolbar button:hover { background: #45475a; }

    .toolbar select {
      background: #313244;
      color: #cdd6f4;
      border: none;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }

    #stats {
      font-size: 12px;
      color: #6c7086;
      margin-left: auto;
      align-self: center;
    }

    #editor {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      padding: 20px;
      font-size: 15px;
      line-height: 1.7;
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: inherit;
    }

    #editor::placeholder { color: #45475a; }

    footer {
      background: #181825;
      padding: 4px 16px;
      font-size: 12px;
      color: #6c7086;
      border-top: 1px solid #313244;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

<header>
  <h1>📝 Notepad</h1>
  <input id="file-name" type="text" value="untitled.txt" title="File name">
</header>

<div class="toolbar">
  <button onclick="newNote()">New</button>
  <button onclick="saveFile()">Save</button>
  <button onclick="openFile()">Open</button>
  <button onclick="copyAll()">Copy All</button>
  <button onclick="clearNote()">Clear</button>
  <select id="font-size" onchange="changeFontSize(this.value)" title="Font size">
    <option value="13">13px</option>
    <option value="15" selected>15px</option>
    <option value="17">17px</option>
    <option value="20">20px</option>
  </select>
  <span id="stats">0 words · 0 chars</span>
</div>

<textarea id="editor" placeholder="Start typing..."></textarea>

<footer>
  <span id="cursor-pos">Ln 1, Col 1</span>
  <span>Auto-saved to browser</span>
</footer>

<input type="file" id="file-input" accept=".txt,.md" style="display:none">

<script>
  const editor = document.getElementById('editor');
  const stats = document.getElementById('stats');
  const cursorPos = document.getElementById('cursor-pos');
  const fileName = document.getElementById('file-name');

  // Load from localStorage
  editor.value = localStorage.getItem('notepad-content') || '';
  fileName.value = localStorage.getItem('notepad-filename') || 'untitled.txt';
  updateStats();

  editor.addEventListener('input', () => {
    updateStats();
    localStorage.setItem('notepad-content', editor.value);
  });

  editor.addEventListener('keyup', updateCursor);
  editor.addEventListener('click', updateCursor);

  fileName.addEventListener('input', () => {
    localStorage.setItem('notepad-filename', fileName.value);
  });

  function updateStats() {
    const text = editor.value.trim();
    const words = text ? text.split(/\s+/).length : 0;
    stats.textContent = `${words} words · ${editor.value.length} chars`;
  }

  function updateCursor() {
    const text = editor.value.substring(0, editor.selectionStart);
    const lines = text.split('\n');
    cursorPos.textContent = `Ln ${lines.length}, Col ${lines[lines.length - 1].length + 1}`;
  }

  function newNote() {
    if (editor.value && !confirm('Discard current note?')) return;
    editor.value = '';
    fileName.value = 'untitled.txt';
    localStorage.removeItem('notepad-content');
    updateStats();
  }

  function saveFile() {
    const blob = new Blob([editor.value], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fileName.value || 'note.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function openFile() {
    document.getElementById('file-input').click();
  }

  document.getElementById('file-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    fileName.value = file.name;
    const reader = new FileReader();
    reader.onload = (ev) => {
      editor.value = ev.target.result;
      localStorage.setItem('notepad-content', editor.value);
      localStorage.setItem('notepad-filename', file.name);
      updateStats();
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  function copyAll() {
    navigator.clipboard.writeText(editor.value).then(() => {
      const btn = event.target;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy All', 1200);
    });
  }

  function clearNote() {
    if (!editor.value || confirm('Clear all text?')) {
      editor.value = '';
      localStorage.removeItem('notepad-content');
      updateStats();
    }
  }

  function changeFontSize(size) {
    editor.style.fontSize = size + 'px';
  }
</script>

</body>
</html>
